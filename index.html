<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Click this link, I have a quick question for you! 👀">
  <meta name="theme-color" content="#ffd0e5">
  <title>Hi my Fio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    .gradient-background {
      background: linear-gradient(180deg, #ffd0e5 0%, #ffe8f2 36%, #ffffff 100%);
      min-height: 100vh;
    }

    .bounce {
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }
  </style>
  <link rel="preload" as="image" href="./images/image1.gif">
  <link rel="preload" as="image" href="./images/image2.gif">
  <link rel="preload" as="image" href="./images/image3.gif">
  <link rel="preload" as="image" href="./images/image4.gif">
  <link rel="preload" as="image" href="./images/image5.gif">
  <link rel="preload" as="image" href="./images/image6.gif">
  <link rel="preload" as="image" href="./images/image7.gif">
</head>
<body class="gradient-background">

  <main class="flex items-center justify-center h-screen overflow-hidden relative">
    <section class="flex flex-col items-center p-4 max-w-md mx-auto">
      <img
        id="imageDisplay"
        src="./images/image1.gif"
        alt="Cute kitten with flowers"
        class="rounded-xl h-[300px] object-cover mb-2 shadow-sm"
      />
      
      <p id="loveNote" class="text-base font-medium text-[#bd1e59] opacity-90 text-center italic my-2 px-4 transition-all duration-500">
        "From the moment we started talking, you’ve made my world so much brighter. I want to be there for you through everything..."
      </p>

      <h1 id="valentineQuestion" class="text-3xl font-bold italic text-[#bd1e59] my-3 text-center px-2">
        Hi Fio, will you be my girlfriend? 🤍
      </h1>

      <p id="destinyLabel" class="hidden text-lg font-bold text-red-600 text-center animate-pulse my-2 px-4">
        REALLY NO. But Destiny says you have to click YES! 👀
      </p>

      <div id="responseButtons" class="flex gap-4 pt-4 items-center">
        <button
          id="yesButton"
          class="bounce inline-flex items-center justify-center whitespace-nowrap rounded-md text-xl font-medium cursor-pointer px-4 py-2 bg-green-500 text-white transition-all duration-300 ease-in-out hover:bg-green-400 min-h-12 min-w-[75px]"
        >
          Yes
        </button>
        <button
          id="noButton"
          class="inline-flex items-center justify-center text-center whitespace-nowrap rounded-md text-xl font-medium cursor-pointer px-6 py-2 bg-red-500 text-white transition-colors hover:bg-red-700 h-12 min-w-[75px]"
        >
          No
        </button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      // DOM references
      const yesButton = document.getElementById('yesButton');
      const noButton = document.getElementById('noButton');
      const imageDisplay = document.getElementById('imageDisplay');
      const valentineQuestion = document.getElementById('valentineQuestion');
      const responseButtons = document.getElementById('responseButtons');
      const loveNote = document.getElementById('loveNote');
      const destinyLabel = document.getElementById('destinyLabel');

      // Initialize regular click sound effect asset with a cache buster
      const clickFX = new Audio('click-sound.mp3?v=2');
      clickFX.preload = 'auto';
      clickFX.load();

      // Initialize the trolling/evading sound effect for the hyper-speed runaway phase
      const evadeFX = new Audio('evade-sound.mp3?v=2');
      evadeFX.preload = 'auto';
      evadeFX.load();

      // Configuration
      const GROWTH_PER_CLICK = 35;
      const FONT_GROWTH_PER_CLICK = 25;
      const MAX_NO_CLICKS = 5;

      const IMAGE_PATHS = [
        './images/image1.gif',
        './images/image2.gif',
        './images/image3.gif',
        './images/image4.gif',
        './images/image5.gif',
        './images/image6.gif',
        './images/image7.gif',
      ];

      // Playfully pleading personalized messages for Fio
      const NO_BUTTON_MESSAGES = [
        'No',
        'Wait, are you sure? 🥺',
        'Think about it again, Fio...',
        'Please say yes? ❤️',
        'I promise to always make you smile!',
        'No 🏃‍♂️',
      ];

      const ALT_TEXTS = [
        'Cute kitten with flowers',
        'Sad kitten looking up',
        'Kitten begging',
        'Heartbroken kitten',
        'Crying kitten',
        'Devastated kitten',
        'Happy kitten celebrating',
      ];

      // State
      let noClickCount = 0;
      let buttonHeight = 48;
      let buttonWidth = 80;
      let fontSize = 20;

      // Function to move the No button randomly around the screen with hyper-speed transitions
      function teleportNoButton() {
        // Play the funny evasion sound effect instantly whenever the button runs away
        evadeFX.currentTime = 0;
        evadeFX.play();

        // Shrink the button size drastically down on the final instance
        noButton.style.width = '65px';
        noButton.style.height = '35px';
        noButton.style.fontSize = '14px';
        noButton.style.padding = '0px';
        
        // Accelerated transition physics to make it slippery
        noButton.style.transition = 'all 0.08s cubic-bezier(0.19, 1, 0.22, 1)';
        
        const padding = 40;
        const maxX = window.innerWidth - 65 - padding;
        const maxY = window.innerHeight - 35 - padding;

        const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
        const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

        noButton.style.position = 'absolute';
        noButton.style.left = `${randomX}px`;
        noButton.style.top = `${randomY}px`;
      }

      noButton.addEventListener('click', () => {
        // LOGICAL AUDIO FIX: If we are already at or past the limit, ONLY evade. Don't play the click pop.
        if (noClickCount >= MAX_NO_CLICKS) {
          teleportNoButton();
          return;
        }

        noClickCount++;

        // Hides the romantic letter text on the very first "No" click
        loveNote.style.display = 'none';

        // Update image and alt text
        imageDisplay.src = IMAGE_PATHS[noClickCount];
        imageDisplay.alt = ALT_TEXTS[noClickCount];

        // Grow the "Yes" button to make it harder to ignore
        buttonHeight += GROWTH_PER_CLICK;
        buttonWidth += GROWTH_PER_CLICK;
        fontSize += FONT_GROWTH_PER_CLICK;

        yesButton.style.height = `${buttonHeight}px`;
        yesButton.style.width = `${buttonWidth}px`;
        yesButton.style.fontSize = `${fontSize}px`;

        // Update "No" button text with increasingly desperate messages
        noButton.textContent = NO_BUTTON_MESSAGES[noClickCount];

        // Activate evasion mode and show stationary text if final state hit
        if (noClickCount === MAX_NO_CLICKS) {
          destinyLabel.classList.remove('hidden');
          teleportNoButton(); // This handles playing evadeFX cleanly on the transition click
        } else {
          // Play regular click sound effect ONLY for standard click intervals (1 through 4)
          clickFX.currentTime = 0; 
          clickFX.play();
        }
      });

      // Evade the mouse pointer whenever it hovers over the button on the final step
      noButton.addEventListener('mouseover', () => {
        if (noClickCount === MAX_NO_CLICKS) {
          teleportNoButton();
        }
      });

      yesButton.addEventListener('click', () => {
        // Play regular click sound effect once before the big celebration music tracks over it
        clickFX.currentTime = 0;
        clickFX.play();

        imageDisplay.src = IMAGE_PATHS[IMAGE_PATHS.length - 1];
        imageDisplay.alt = ALT_TEXTS[ALT_TEXTS.length - 1];
        
        // Custom, playful victory success state changes!
        valentineQuestion.textContent = "Phew! For a second there, I thought I'd have to make the button run faster. Glad we're on the same page! 😂🤍";
        loveNote.style.display = 'none'; 
        destinyLabel.style.display = 'none';
        responseButtons.style.display = 'none';

        // Play local MP3 audio loop instantly when she clicks Yes
        const audio = new Audio('success-music.mp3');
        audio.loop = true; 
        audio.play();

        // Heart-shaped confetti for a valentine theme
        const heart = confetti.shapeFromPath({
          path: 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
        });

        const defaults = { spread: 360,
